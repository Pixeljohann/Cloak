<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MAC Changer</title>
    <style>body{font-family:Arial;margin:12px}label{display:block;margin-bottom:6px}</style>
  </head>
  <body>
    <label>Interface: <input id="iface" placeholder="Ethernet"/></label>
    <label>MAC: <input id="mac" placeholder="001122334455"/></label>
    <button id="changeBtn">Change MAC Now</button>
    <button id="saveBtn">Save Settings</button>
    <div style="margin-top:8px">Next change in: <span id="next">--:--:--</span></div>
    <div id="status" style="margin-top:8px;color:#333"></div>
    <script src="popup.js"></script>
  </body>
</html>
